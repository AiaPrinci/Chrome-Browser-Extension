<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<title>PDF Sentence Navigator</title>
<style>
  body {
    width: 280px;
    font-family: Arial, sans-serif;
    padding: 14px;
    margin: 0;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 8px;
  }
  p {
    font-size: 12px;
    color: #444;
    line-height: 1.4;
  }
  input[type="file"] {
    width: 100%;
    margin-top: 8px;
  }
  .hint {
    margin-top: 10px;
    font-size: 11px;
    color: #777;
  }
  kbd {
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <h1>PDF Sentence Navigator</h1>
  <p>აირჩიე PDF ფაილი, გაიხსნება extension-ის საკუთარ ჩამწერში,
     სადაც <kbd>Tab</kbd> / <kbd>Shift+Tab</kbd>-ით შეძლებ წინადადებებზე
     გადაადგილებას.</p>
  <input type="file" id="file-input" accept="application/pdf" />
  <p class="hint">
    ასევე შეგიძლია უბრალოდ ნებისმიერ .pdf ბმულზე დაწკაპუნება — extension
    ავტომატურად გახსნის მას ამ ჩამწერში.
  </p>
  <script src="popup.js"></script>
</body>
</html>
